kind = "web"
previewPath = "/"
title = "Money Saathi"
version = "1.0.0"
id = "artifacts/money-saathi-v1"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25486
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/money-saathi-v1 run dev"

[services.env]
PORT = "25486"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/money-saathi-v1", "run", "build"]
publicDir = "artifacts/money-saathi-v1/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
